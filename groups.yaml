# Configuration for OpenAPI documentation groups.
#
# This file drives the code generator that produces per-group OpenAPI YAML files (written to the openapi/ directory)
# from the compiled Java interfaces. It has three top-level keys:
#
#   security – Identifies which Java interfaces carry authentication annotations so the generator can propagate
#              the correct security schemes.
#   groups – Ordered list of API groups; each group becomes one OpenAPI file.
#   common – Shared metadata (version, license, contact, servers…) that is merged into every generated OpenAPI document.

# ---------------------------------------------------------------------------
# security
#
# baseSecurityInterfaces
#   Fully qualified names of the marker interfaces that controllers extend to declare their authentication requirements.
#   The generator uses these to decide which security scheme (bearer token, no-auth…) to attach to each
#   generated operation.
#
# legacyControllers
#   Controllers that use the legacy auth model and therefore need special-case handling during generation.
# ---------------------------------------------------------------------------
security:
  baseSecurityInterfaces:
    - com.otilm.api.interfaces.AuthProtectedController
    - com.otilm.api.interfaces.AuthProtectedConnectorController
    - com.otilm.api.interfaces.connector.common.v2.AuthProtectedConnectorController
    - com.otilm.api.interfaces.NoAuthController
    - com.otilm.api.interfaces.connector.common.v2.NoAuthConnectorController
  legacyControllers:
    - com.otilm.api.interfaces.core.web.InfoController

# ---------------------------------------------------------------------------
# groups
#
# Each entry defines one API group rendered into its own OpenAPI file.
# Supported fields per group entry:
#
#   id             (required) Unique identifier; also used as the output file name: openapi/<id>.yaml.
#   groupName      (required) Short slug used in URL paths and Redocly portal navigation.
#   title          (required) Human-readable display name shown in the portal.
#   description    Short prose describing the purpose of this API group.
#   indexCategory  Portal navigation category. Recognized values:
#                    connector  – connector-side APIs
#                    core       – platform core APIs
#                    messaging  – messaging APIs
#                    protocol   – protocol gateway APIs
#                  Groups without this field are not included in the portal navigation page.
#   navLabel       Optional override for the display name used in the generated portal navigation entry.
#                  When present, this value is used verbatim. When absent, the name is derived from title
#                  by stripping the trailing " API" suffix (or falling back to id if title is absent).
#                  Only meaningful for groups that have indexCategory set.
#   serverUrl      Overrides the default server URL defined in common.servers for this specific group.
#   interfaces     (required) Ordered list of fully-qualified Java controller interface names whose operations
#                  are merged into this group.
#   security       Overrides the set of OpenAPI security schemes included in the generated OpenAPI document's
#                  components/securitySchemes section. When omitted (default), the OpenAPI generator derives the schemes
#                  automatically from the interfaces listed above by inspecting which baseSecurityInterfaces
#                  they extend. Set to an empty list ([]) to suppress all security scheme generation for the
#                  group — useful for aggregate/umbrella documents (e.g. doc-openapi-ilm-core).
#   extensions     Arbitrary OpenAPI extension properties (x-*) to add at the info object level of the generated document.
# ---------------------------------------------------------------------------
groups:
  - id: doc-openapi-cert-manager
    groupName: cert-manager
    title: Cert Manager
    description: REST API for implementations of cert-manager issuer
    interfaces:
