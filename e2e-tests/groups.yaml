# E2E test configuration for the ILM interface documentation pipeline.
#
# This file is intentionally self-contained: it references only interfaces defined within the e2e-tests module itself,
#so the build does not depend on the external com.otilm:interfaces artifact.

security:
  baseSecurityInterfaces:
    - com.otilm.openapi.test.interfaces.security.TestAuthProtectedController
    - com.otilm.openapi.test.interfaces.security.TestNoAuthController
  legacyControllers:

groups:
  - id: e2e-test-widgets
    groupName: e2e-widgets
    title: Widget API
    description: Test API for managing widgets
    indexCategory: core
    interfaces:
      - com.otilm.openapi.test.interfaces.TestWidgetController

  - id: e2e-test-status
    groupName: e2e-status
    title: Status API
    description: Test API for system status
    indexCategory: core
    interfaces:
      - com.otilm.openapi.test.interfaces.TestStatusController

  - id: e2e-test-client-api
    groupName: e2e-client-api
    title: Client API
    description: Test API for client generation with no security
    indexCategory: core
    security: []
    interfaces:
      - com.otilm.openapi.test.interfaces.TestWidgetController
      - com.otilm.openapi.test.interfaces.TestStatusController

common:
  contact:
    name: E2E Test
    url: https://example.com
    email: test@example.com
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  externalDocs:
    description: Test Documentation
    url: https://example.com/docs
  servers:
    - url: https://example.com/api
      description: E2E test server
